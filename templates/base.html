{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-LinkedIn</title> 

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/feed.css' %}">
    <link rel="stylesheet" href="{% static 'css/cadastro.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="stylesheet" href="{% static 'css/404.css' %}">
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">

</head>
<body>
    {% include 'components/navbar.html' %}
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div style="background-color: rgba(255, 69, 0, 0.1); border-left: 4px solid var(--accent-orange); color: var(--text-light); padding: 15px; margin-bottom: 20px; border-radius: 0 4px 4px 0;">
                    <i class="fa-solid fa-circle-exclamation" style="color: var(--accent-orange); margin-right: 10px;"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
