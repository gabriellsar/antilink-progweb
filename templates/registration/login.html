{% extends "base.html" %}

{% block content %}
<div class="card login-wrapper">
    <div style="text-align: center; margin-bottom: 30px;">
        <h2><i class="fa-solid fa-triangle-exclamation" style="color: var(--accent-orange); margin-right: 10px;"></i>Autenticação</h2>
        <p style="color: #aaa; margin-top: 10px;">Insira suas credenciais para reviver seus piores momentos acadêmicos e profissionais.</p>
    </div>
    
    <form method="post" class="login-form">
        {% csrf_token %}
        {{ form.as_p }}
        
        <div class="action-buttons">
            <button type="submit" class="btn-danger" style="width: 100%; padding: 12px;">
                <i class="fa-solid fa-right-to-bracket"></i> Entrar
            </button>
            
            <a href="{% url 'cadastro' %}" class="btn-secondary">
                <i class="fa-solid fa-user-plus"></i> Criar Conta
            </a>
        </div>
    </form>
    
    <div style="margin-top: 30px; text-align: center; font-size: 0.9em; border-top: 1px solid #333; padding-top: 20px;">
        <p>
            <a href="{% url 'password_reset' %}" style="color: var(--text-muted); text-decoration: none; transition: color 0.3s ease;" onmouseover="this.style.color='var(--accent-orange)'" onmouseout="this.style.color='var(--text-muted)'">
                <i class="fa-solid fa-key"></i> Esqueceu a senha? Que novidade... Clique aqui.
            </a>
        </p>
    </div>
</div>
{% endblock %}
